<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="image/phoneicon.png">
    <link rel="stylesheet" href="register.css">
    <title>Register In</title>
</head>
<body>
    <div class="login-form">
        <h1>Register</h1>
        <div class="container">
            <div class="main">
                <div class="content">
                    <h2>Register In</h2>
                    <form action="" method="post">
                        <input type="text" name="" id="" placeholder="First Name" required>
                        <input type="text" name="" id="" placeholder="Last Name" required>
                        <input type="password" name="" id="" placeholder="Password" required>
                        <input type="password" name="" id="" placeholder="Confrim Password" required>
                        <button class="btn" type="submit">
                            Register
                        </button>
                    </form>
                    <div class="register">
                        <p class="account">Have An Account?</p> <a href="../login/login.html">Login</a>
                    </div>
                </div>
                <div class="form-img">
                    <img src="image/register.png" alt="register_img">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
