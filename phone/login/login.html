<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="image/phoneicon.png">
    <link rel="stylesheet" href="login.css">
    <title>Login In</title>
</head>
<body>
    <div class="login-form">
        <h1>Login</h1>
        <div class="container">
            <div class="main">
                <div class="content">
                    <h2>Login In</h2>
                    <form action="" method="post">
                        <input type="text" name="" id="" placeholder="User Name" required>
                        <input type="password" name="" id="" placeholder="User Password" required>
                        <button class="btn" type="submit">
                            Login
                        </button>
                    </form>
                    <div class="register">
                        <p class="account">Don't Have An Account?</p> <a href="../register/register.html">Register</a>
                    </div>
                </div>
                <div class="form-img">
                    <img src="image/login.png" alt="register_login">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
